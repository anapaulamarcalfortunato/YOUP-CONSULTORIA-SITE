<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script>
        if (localStorage.getItem('youp_idioma') === 'pt') {
            window.location.replace('material-de-apoio.html');
        }
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6JTWLMZBRS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6JTWLMZBRS');
    </script>
    <title>Insights & Career - Youp</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="dados-blog-en.js"></script>

    <style>
        :root { --dourado: #c5a059; --verde: #5c8e82; --preto: #0f0f0f; --cinza: #1a1a1a; --texto: #eeeeee; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--preto); color: var(--texto); overflow-x: hidden; }
        
        /* Language Tools at Top */
        .header-tools { position: absolute; top: 20px; right: 20px; display: flex; align-items: center; gap: 15px; z-index: 10; }
        
        .lang-switch-box {
            font-size: 11px; font-weight: 600; color: var(--cinza-claro); letter-spacing: 2px;
            background: rgba(0,0,0,0.4); padding: 6px 12px; border-radius: 20px;
            border: 1px solid rgba(197, 160, 89, 0.3); display: flex; align-items: center;
        }
        .lang-btn { cursor: pointer; transition: 0.3s; text-decoration: none; color: inherit; }
        .lang-btn:hover { color: #fff; }
        .lang-btn.active { color: var(--dourado); cursor: default; }

        /* Google Translate Widget Override */
        #google_translate_element select {
            background: rgba(0,0,0,0.4); color: #fff; border: 1px solid rgba(197, 160, 89, 0.3);
            padding: 5px; border-radius: 5px; font-family: 'Montserrat', sans-serif; font-size: 10px; outline: none; cursor: pointer;
        }
        .skiptranslate iframe { display: none !important; }
        body { top: 0 !important; }

        /* Premium Header */
        .hero { text-align: center; padding: 60px 20px 40px; background: linear-gradient(180deg, var(--cinza) 0%, var(--preto) 100%); border-bottom: 1px solid rgba(197, 160, 89, 0.1); position: relative; }
        .hero h1 { color: var(--dourado); font-size: 36px; font-weight: 800; margin: 0; letter-spacing: 1px; }
        .hero p { color: #888; font-size: 14px; max-width: 500px; margin: 15px auto 0; line-height: 1.6; }
        .btn-back-home { position: absolute; top: 20px; left: 20px; color: var(--dourado); text-decoration: none; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        /* Elegant Filters */
        .filters { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 50px; }
        .filter-btn { background: transparent; color: #888; border: 1px solid #333; padding: 8px 20px; border-radius: 30px; font-family: 'Montserrat'; font-size: 11px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
        .filter-btn:hover { border-color: var(--dourado); color: var(--texto); }
        .filter-btn.active { background: var(--dourado); border-color: var(--dourado); color: var(--preto); }

        /* Magazine Style Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; }
        .card { background: var(--cinza); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; overflow: hidden; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; position: relative; }
        .card:hover { border-color: var(--dourado); transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.6); }
        
        .thumb-wrapper { position: relative; height: 220px; overflow: hidden; }
        .thumb { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .card:hover .thumb { transform: scale(1.05); }
        
        .badge { position: absolute; top: 15px; left: 15px; background: var(--verde); color: var(--preto); padding: 5px 12px; border-radius: 20px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        .content { padding: 25px; flex: 1; display: flex; flex-direction: column; }
        .meta { display: flex; justify-content: space-between; color: #777; font-size: 11px; font-weight: 400; margin-bottom: 12px; }
        .meta span { display: flex; align-items: center; gap: 5px; }
        
        .title { font-size: 20px; margin: 0 0 10px; color: var(--texto); line-height: 1.3; font-weight: 700; transition: color 0.3s; }
        .card:hover .title { color: var(--dourado); }
        .resumo { font-size: 13px; color: #999; line-height: 1.6; margin: 0; flex: 1; }
        
        .read-more { margin-top: 20px; font-size: 11px; font-weight: 700; color: var(--dourado); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }
        .card:hover .read-more { gap: 10px; }

        /* Modal Ultra Premium */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 15, 15, 0.95); z-index:100; backdrop-filter: blur(10px); opacity: 0; transition: opacity 0.3s ease; }
        #modal.show { display: block; opacity: 1; }
        
        .modal-body { max-width:800px; margin: 0 auto; background: var(--preto); padding: 0; border-radius: 0; border-left: 1px solid rgba(197, 160, 89, 0.2); border-right: 1px solid rgba(197, 160, 89, 0.2); height: 100vh; overflow-y: auto; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8); transform: translateY(20px); transition: transform 0.4s ease; }
        #modal.show .modal-body { transform: translateY(0); }
        
        .modal-header-img { width: 100%; height: 300px; object-fit: cover; border-bottom: 3px solid var(--dourado); }
        
        .close-btn { position: fixed; top: 20px; right: 30px; background: rgba(0,0,0,0.5); color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; z-index: 101; backdrop-filter: blur(5px); }
        .close-btn:hover { background: var(--dourado); color: var(--preto); border-color: var(--dourado); transform: rotate(90deg); }

        .modal-content-inner { padding: 50px; }
        .modal-meta { display: flex; gap: 20px; color: var(--verde); font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        #m-title { color: var(--texto); font-size: 32px; font-weight: 800; line-height: 1.2; margin: 0 0 30px 0; }
        
        #m-text { line-height: 1.9; white-space: pre-wrap; color: #ccc; font-size: 16px; font-weight: 300; text-align: justify; }
        #m-text strong { color: var(--dourado); font-weight: 600; }
        #m-text h3 { color: var(--texto); font-size: 20px; margin-top: 30px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="hero">
        <a href="index-en.html" class="btn-back-home">← Back to Hub</a>
        
        <div class="header-tools">
            <div id="google_translate_element"></div>
            <div class="lang-switch-box">
                <span class="lang-btn" onclick="definirIdiomaBlog('pt')">PT</span> 
                <span style="opacity: 0.3; margin: 0 8px;">|</span> 
                <span class="lang-btn active">EN</span>
            </div>
        </div>

        <h1>Insights & Career</h1>
        <p>Advanced strategies, market intelligence, and tools to leverage your professional trajectory.</p>
    </div>

    <div class="container">
        <div id="filters" class="filters"></div>
        <div id="grid" class="grid"></div>
    </div>

    <div id="modal" onclick="fecharModal()">
        <button class="close-btn" onclick="fecharModal()">×</button>
        <div class="modal-body" onclick="event.stopPropagation()">
            <img id="m-img" src="" class="modal-header-img" alt="Cover">
            <div class="modal-content-inner">
                <div class="modal-meta">
                    <span id="m-cat"></span> • <span id="m-date"></span>
                </div>
                <h2 id="m-title"></h2>
                <div id="m-text"></div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        function definirIdiomaBlog(lang) {
            if (lang === 'pt') {
                localStorage.setItem('youp_idioma', 'pt');
                window.location.href = 'material-de-apoio.html';
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            if (typeof materiaisYoup === 'undefined') {
                document.getElementById('grid').innerHTML = "<p style='text-align:center; color:red;'>Error: File dados-blog-en.js not found!</p>";
                return;
            }
            renderizarFiltros();
            renderizarGrid(materiaisYoup);
        });

        function renderizarFiltros() {
            const filtersDiv = document.getElementById('filters');
            const categorias = [...new Set(materiaisYoup.map(p => p.categoria).filter(c => c))];
            
            let htmlFiltros = `<button class="filter-btn active" onclick="filtrar('All', this)">All Articles</button>`;
            categorias.forEach(cat => {
                htmlFiltros += `<button class="filter-btn" onclick="filtrar('${cat}', this)">${cat}</button>`;
            });
            filtersDiv.innerHTML = htmlFiltros;
        }

        function renderizarGrid(lista) {
            const grid = document.getElementById('grid');
            if (lista.length === 0) {
                grid.innerHTML = "<p style='color:#888; text-align:center; grid-column: 1 / -1;'>No materials found for this category.</p>";
                return;
            }

            grid.innerHTML = lista.map((p, index) => `
                <div class="card" onclick="abrir(${p.id})">
                    <div class="thumb-wrapper">
                        <span class="badge">${p.categoria}</span>
                        <img src="${p.imagem}" class="thumb" onerror="this.src='https://via.placeholder.com/600x400/1a1a1a/c5a059?text=Youp'">
                    </div>
                    <div class="content">
                        <div class="meta">
                            <span>📅 ${p.data}</span>
                            <span>⏱️ ${p.tempoLeitura || '2 min'}</span>
                        </div>
                        <h3 class="title">${p.titulo}</h3>
                        <p class="resumo">${p.resumo || 'Click to read the full article.'}</p>
                        <div class="read-more">Read Full Article ➔</div>
                    </div>
                </div>
            `).join('');
        }

        function filtrar(categoria, botao) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            botao.classList.add('active');

            if (categoria === 'All') {
                renderizarGrid(materiaisYoup);
            } else {
                const filtrados = materiaisYoup.filter(p => p.categoria === categoria);
                renderizarGrid(filtrados);
            }
        }

        function abrir(idTarget) {
            const p = materiaisYoup.find(item => item.id === idTarget);
            if(!p) return;

            document.getElementById('m-img').src = p.imagem;
            document.getElementById('m-cat').innerText = p.categoria;
            document.getElementById('m-date').innerText = p.data;
            document.getElementById('m-title').innerText = p.titulo;
            document.getElementById('m-text').innerHTML = p.conteudo; 
            
            const modal = document.getElementById('modal');
            modal.style.display = 'block'; 
            setTimeout(() => { modal.classList.add('show'); }, 10);
            document.body.style.overflow = 'hidden';
        }

        function fecharModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('show');
            setTimeout(() => { modal.style.display = 'none'; }, 300); 
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
