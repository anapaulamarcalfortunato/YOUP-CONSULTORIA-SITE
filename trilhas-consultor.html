<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trilhas de Aprendizado - Youp</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        if (sessionStorage.getItem('consultorYoupLogado') !== 'true') {
            window.location.href = "portal-do-consultor.html"; // Chuta de volta pro login
        }
    </script>

    <script src="dados-consultor.js"></script>

    <style>
        :root { --dourado: #c5a059; --verde: #5c8e82; --preto: #0f0f0f; --cinza: #1a1a1a; --texto: #eeeeee; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--preto); color: var(--texto); overflow-x: hidden; }
        
        .hero { text-align: center; padding: 60px 20px 40px; background: linear-gradient(180deg, var(--cinza) 0%, var(--preto) 100%); border-bottom: 1px solid rgba(197, 160, 89, 0.1); position: relative; }
        .hero h1 { color: var(--dourado); font-size: 32px; font-weight: 800; margin: 0; letter-spacing: 1px; text-transform: uppercase; }
        .hero p { color: #888; font-size: 14px; max-width: 500px; margin: 15px auto 0; line-height: 1.6; }
        
        .header-actions { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; }
        .btn-action { color: var(--dourado); text-decoration: none; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; background: none; border: none; }
        .btn-action:hover { color: var(--verde); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        /* Filtros das Trilhas */
        .filters { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
        .filter-btn { background: var(--cinza); color: #888; border: 1px solid rgba(255,255,255,0.1); padding: 10px 25px; border-radius: 30px; font-family: 'Montserrat'; font-size: 12px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        .filter-btn:hover { border-color: var(--dourado); color: var(--texto); }
        .filter-btn.active { background: rgba(197, 160, 89, 0.1); border-color: var(--dourado); color: var(--dourado); }

        /* Grid de Aulas */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--cinza); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 30px; transition: 0.3s; display: flex; flex-direction: column; cursor: pointer; border-left: 3px solid var(--dourado); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); background: #222; }
        
        .modulo-badge { color: var(--verde); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .title { font-size: 18px; margin: 0 0 15px; color: var(--texto); font-weight: 700; line-height: 1.4; }
        .resumo { font-size: 13px; color: #999; line-height: 1.6; flex: 1; margin: 0; }
        
        .read-more { margin-top: 25px; font-size: 11px; font-weight: 700; color: var(--dourado); text-transform: uppercase; letter-spacing: 1px; }

        /* Modal da Aula */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 15, 15, 0.98); z-index:100; backdrop-filter: blur(5px); }
        .modal-body { max-width:800px; margin: 0 auto; background: var(--preto); border-left: 1px solid rgba(197, 160, 89, 0.2); border-right: 1px solid rgba(197, 160, 89, 0.2); height: 100vh; overflow-y: auto; padding: 60px; box-sizing: border-box; }
        
        .close-btn { position: fixed; top: 20px; right: 30px; color: #fff; font-size: 35px; cursor: pointer; z-index: 110; opacity: 0.5; transition: 0.3s; }
        .close-btn:hover { opacity: 1; color: var(--dourado); }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; margin-bottom: 30px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); display: none; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        #m-modulo { color: var(--verde); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        #m-title { font-size: 28px; color: var(--dourado); margin: 0 0 30px 0; line-height: 1.3; }
        #m-text { line-height: 1.8; color: #ccc; font-size: 15px; white-space: pre-wrap; }
        #m-text h3 { color: var(--texto); margin-top: 30px; margin-bottom: 10px; font-size: 18px; }
        #m-text b { color: var(--dourado); }
    </style>
</head>
<body>

    <div class="hero">
        <div class="header-actions">
            <a href="portal-do-consultor.html" class="btn-action">← Voltar ao Hub</a>
            <button onclick="fazerLogout()" class="btn-action">Sair (Logout) ×</button>
        </div>
        <h1>Universidade Corporativa</h1>
        <p>Acesso exclusivo aos materiais de padronização, processos e cultura da Youp Consultoria.</p>
    </div>

    <div class="container">
        <div id="filters" class="filters"></div>
        <div id="aulasGrid" class="grid"></div>
    </div>

    <div id="modal">
        <span class="close-btn" onclick="fecharModal()">×</span>
        <div class="modal-body" onclick="event.stopPropagation()">
            <div id="m-video-box" class="video-container">
                <iframe id="m-video" src="" allowfullscreen></iframe>
            </div>
            <span id="m-modulo" class="modulo-badge"></span>
            <h2 id="m-title"></h2>
            <div id="m-text"></div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof trilhasYoup === 'undefined') {
                document.getElementById('aulasGrid').innerHTML = "<p style='text-align:center; color:red;'>Erro: Arquivo dados-consultor.js não encontrado!</p>";
                return;
            }
            renderizarFiltros();
            renderizarGrid(trilhasYoup);
        });

        function renderizarFiltros() {
            const filtersDiv = document.getElementById('filters');
            const trilhas = [...new Set(trilhasYoup.map(a => a.trilha).filter(t => t))];
            
            let htmlFiltros = `<button class="filter-btn active" onclick="filtrar('Todas', this)">Todas as Trilhas</button>`;
            trilhas.forEach(trilha => {
                htmlFiltros += `<button class="filter-btn" onclick="filtrar('${trilha}', this)">${trilha}</button>`;
            });
            filtersDiv.innerHTML = htmlFiltros;
        }

        function renderizarGrid(lista) {
            const grid = document.getElementById('aulasGrid');
            if (lista.length === 0) {
                grid.innerHTML = "<p style='color:#888; text-align:center; grid-column: 1 / -1;'>Nenhuma aula encontrada.</p>";
                return;
            }

            grid.innerHTML = lista.map(a => `
                <div class="card" onclick="abrirAula(${a.id})">
                    <span class="modulo-badge">${a.trilha} • ${a.modulo}</span>
                    <h3 class="title">${a.titulo}</h3>
                    <p class="resumo">${a.resumo}</p>
                    <div class="read-more">Acessar Material ➔</div>
                </div>
            `).join('');
        }

        function filtrar(trilha, botao) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            botao.classList.add('active');

            if (trilha === 'Todas') {
                renderizarGrid(trilhasYoup);
            } else {
                const filtradas = trilhasYoup.filter(a => a.trilha === trilha);
                renderizarGrid(filtradas);
            }
        }

        function abrirAula(idTarget) {
            const a = trilhasYoup.find(item => item.id === idTarget);
            if(!a) return;

            document.getElementById('m-modulo').innerText = `${a.trilha} • ${a.modulo}`;
            document.getElementById('m-title').innerText = a.titulo;
            document.getElementById('m-text').innerHTML = a.conteudo;

            const videoBox = document.getElementById('m-video-box');
            const videoIframe = document.getElementById('m-video');

            if (a.linkVideo && a.linkVideo.trim() !== "") {
                videoIframe.src = a.linkVideo;
                videoBox.style.display = "block";
            } else {
                videoIframe.src = "";
                videoBox.style.display = "none";
            }

            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function fecharModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('m-video').src = ""; // Para parar o vídeo se estiver tocando
            document.body.style.overflow = 'auto';
        }

        function fazerLogout() {
            sessionStorage.removeItem('consultorYoupLogado');
            window.location.href = "portal-do-consultor.html";
        }
    </script>
</body>
</html>
