    <style>
        :root {
            --verde-youp: #5c8e82;
            --verde-claro: #84a98c;
            --dourado: #c5a059;
            --cinza-escuro: #1a1a1a;
            --cinza-medio: #333333;
            --cinza-claro: #b0b0b0;
            --linkedin-blue: #0077b5;
            --insta-pink: #e1306c;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-image: linear-gradient(135deg, rgba(15, 15, 15, 0.95), rgba(30, 30, 30, 0.9)), url('https://images.unsplash.com/photo-1523966211575-eb4a01e7dd51?q=80&w=1600');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 15px;
            max-width: 600px;
            width: 95%;
            padding: 40px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        .header-top {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .btn-back {
            color: var(--dourado);
            text-decoration: none;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .page-title {
            color: var(--dourado);
            margin: 0 0 10px 0;
            font-size: 26px;
            font-weight: 600;
        }
        .page-subtitle {
            font-size: 12px;
            color: var(--cinza-claro);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* Contact Grid */
        .contact-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .contact-link {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s;
        }

        .contact-link:hover {
            transform: translateX(10px);
            border-color: var(--dourado);
            background: rgba(197, 160, 89, 0.05);
        }

        .icon {
            font-size: 20px;
            margin-right: 15px;
            width: 30px;
            text-align: center;
        }

        .link-info {
            text-align: left;
        }

        .link-info strong {
            display: block;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .link-info span {
            font-size: 11px;
            color: var(--cinza-claro);
        }

        /* Social Media Tags */
        .social-tag-linkedin { border-left: 3px solid var(--linkedin-blue); }
        .social-tag-insta { border-left: 3px solid var(--insta-pink); }
        .social-tag-wa { border-left: 3px solid #25d366; }

    </style>
</head>
<body>

    <div class="glass-container">
        
        <div class="header-top">
            <a href="index-en.html" class="btn-back">Close page ×</a>
        </div>

        <h1 class="page-title">Connect With Me</h1>
        <p class="page-subtitle">Official Channels & Social Media</p>
        
        <div class="contact-stack">
            <a href="https://www.linkedin.com/in/anapaulamarcalfortunato/" target="_blank" class="contact-link social-tag-linkedin">
                <span class="icon">🔗</span>
                <div class="link-info">
                    <strong>LinkedIn</strong>
                    <span>Professional Networking & Articles</span>
                </div>
            </a>

            <a href="https://www.instagram.com/anapaulamarcalfortunato/" target="_blank" class="contact-link social-tag-insta">
                <span class="icon">📸</span>
                <div class="link-info">
                    <strong>Instagram</strong>
                    <span>Behind the Scenes & Positioning</span>
                </div>
            </a>

            <a href="https://wa.me/5512991322333" target="_blank" class="contact-link social-tag-wa">
                <span class="icon">📱</span>
                <div class="link-info">
                    <strong>WhatsApp</strong>
                    <span>Direct Contact: +55 (12) 99132-2333</span>
                </div>
            </a>

            <a href="mailto:anapaulamarcal@youpconsultoria.com" class="contact-link">
                <span class="icon">✉️</span>
                <div class="link-info">
                    <strong>Corporate E-mail</strong>
                    <span>anapaulamarcal@youpconsultoria.com</span>
                </div>
            </a>
        </div>

    </div>

</body>
