<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book de Talentos - Youp</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="dados-book.js"></script>

    <style>
        :root { --dourado: #c5a059; --verde: #5c8e82; --preto: #0f0f0f; --cinza: #1a1a1a; --texto: #eeeeee; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--preto); color: var(--texto); overflow-x: hidden; }
        
        /* Cabeçalho Premium */
        .hero { text-align: center; padding: 60px 20px 40px; background: linear-gradient(180deg, var(--cinza) 0%, var(--preto) 100%); border-bottom: 1px solid rgba(197, 160, 89, 0.1); position: relative; }
        .hero h1 { color: var(--dourado); font-size: 36px; font-weight: 800; margin: 0; letter-spacing: 1px; text-transform: uppercase; }
        .hero p { color: #888; font-size: 14px; max-width: 500px; margin: 15px auto 0; line-height: 1.6; }
        .btn-back-home { position: absolute; top: 20px; left: 20px; color: var(--dourado); text-decoration: none; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        /* Filtros / Steps Elegantes */
        .step-box { background: var(--cinza); padding: 30px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 25px; text-align: center; transition: all 0.3s; }
        .step-title { font-size: 12px; text-transform: uppercase; color: var(--verde); font-weight: 700; letter-spacing: 2px; margin-bottom: 20px; display: block; }
        
        .btn-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .btn-local { background: transparent; color: #888; border: 1px solid #333; padding: 12px 30px; border-radius: 30px; font-family: 'Montserrat'; font-size: 12px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
        .btn-local:hover { border-color: var(--dourado); color: var(--texto); }
        .btn-local.active { background: var(--dourado); border-color: var(--dourado); color: var(--preto); }

        .select-area { width: 100%; max-width: 400px; padding: 15px 20px; background: var(--preto); border: 1px solid #333; color: #fff; border-radius: 8px; font-family: 'Montserrat'; font-size: 14px; cursor: pointer; transition: 0.3s; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23c5a059' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 15px center; background-size: 15px; outline: none; }
        .select-area:focus { border-color: var(--dourado); }
        
        #areaStep, #talentGrid { display: none; }
        
        /* Grid Estilo Cartão de Visita Premium */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; margin-top: 40px; }
        .card { background: var(--cinza); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 30px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; position: relative; }
        .card:hover { border-color: var(--dourado); transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.6); }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .badge { background: rgba(92, 142, 130, 0.1); color: var(--verde); padding: 6px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border: 1px solid rgba(92, 142, 130, 0.3); }
        .id-badge { color: var(--dourado); font-size: 11px; font-weight: 700; letter-spacing: 1px; }
        
        .title { font-size: 22px; margin: 0 0 8px; color: var(--texto); line-height: 1.3; font-weight: 700; }
        .cargo { font-size: 13px; color: var(--dourado); font-weight: 600; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        .resumo { font-size: 14px; color: #aaa; line-height: 1.7; margin: 0 0 25px 0; flex: 1; }
        
        .btn-contato { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; background: var(--verde); color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; border: 1px solid var(--verde); }
        .btn-contato:hover { background: transparent; color: var(--verde); }
    </style>
</head>
<body>

    <div class="hero">
        <a href="index.html" class="btn-back-home">← Voltar ao Hub</a>
        <h1>Book de Talentos</h1>
        <p>Acesso exclusivo aos perfis executivos mais qualificados e rigorosamente selecionados do mercado.</p>
    </div>

    <div class="container">
        <div class="step-box">
            <span class="step-title">1. Selecione a Abrangência</span>
            <div class="btn-group">
                <button class="btn-local" onclick="setLocal('Nacional', this)">Nacional</button>
                <button class="btn-local" onclick="setLocal('Internacional', this)">Internacional</button>
            </div>
        </div>

        <div id="areaStep" class="step-box">
            <span class="step-title">2. Escolha a Área de Atuação</span>
            <select id="selectArea" class="select-area" onchange="exibirTalentos(this.value)">
                <option value="">Selecione uma área...</option>
            </select>
        </div>

        <div id="talentGrid" class="grid"></div>
    </div>

    <script>
        let localSelecionado = "";

        // Verifica se o arquivo de dados carregou corretamente
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof talentosYoup === 'undefined') {
                document.getElementById('talentGrid').style.display = 'block';
                document.getElementById('talentGrid').innerHTML = "<p style='text-align:center; color:red;'>Erro: Arquivo dados-book.js não encontrado!</p>";
            }
        });

        function setLocal(local, btn) {
            localSelecionado = local;
            
            // Controle visual dos botões
            document.querySelectorAll('.btn-local').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Filtrar áreas disponíveis com base na localização selecionada
            const areasSet = new Set();
            talentosYoup.forEach(t => {
                if (String(t.localizacao || "").trim().toLowerCase() === local.toLowerCase() && t.area) {
                    areasSet.add(String(t.area).trim());
                }
            });

            // Popula o Select de Áreas
            const areasDisponiveis = Array.from(areasSet).sort();
            const select = document.getElementById('selectArea');
            select.innerHTML = '<option value="">Selecione uma área...</option>';
            
            if(areasDisponiveis.length === 0) {
                select.innerHTML = '<option value="">Nenhum perfil nesta região no momento.</option>';
            } else {
                areasDisponiveis.forEach(area => {
                    const opt = document.createElement('option');
                    opt.value = area; 
                    opt.innerText = area;
                    select.appendChild(opt);
                });
            }

            // Exibe o passo 2 e oculta o grid até a escolha final
            document.getElementById('areaStep').style.display = 'block';
            document.getElementById('talentGrid').style.display = 'none';
        }

        function exibirTalentos(area) {
            if (!area) {
                document.getElementById('talentGrid').style.display = 'none';
                return;
            }
            
            // Filtra os talentos pela localização e área exatas
            const finais = talentosYoup.filter(t => 
                String(t.localizacao || "").trim().toLowerCase() === localSelecionado.toLowerCase() && 
                String(t.area || "").trim() === area
            );
            
            const grid = document.getElementById('talentGrid');
            grid.style.display = 'grid';
            
            grid.innerHTML = finais.map(t => {
                // Montagem da mensagem do WhatsApp
                const textoZap = encodeURIComponent(`Olá Ana, tenho interesse em solicitar a apresentação do perfil ${t.id} - ${t.perfil} do Book de Talentos.`);
                const linkZap = `https://wa.me/5512991322333?text=${textoZap}`;

                return `
                <div class="card">
                    <div class="card-header">
                        <span class="badge">${t.area}</span>
                        <span class="id-badge">ID: ${t.id}</span>
                    </div>
                    <h3 class="title">${t.perfil}</h3>
                    <div class="cargo">${t.cargo}</div>
                    <p class="resumo">${t.resumo}</p>
                    <a href="${linkZap}" target="_blank" class="btn-contato">
                        Solicitar Apresentação ➔
                    </a>
                </div>
                `;
            }).join('');
            
            // Rola a página suavemente até o grid
            setTimeout(() => {
                grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }
    </script>
</body>
</html>
