<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book de Talentos Premium - Youp</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="dados-book.js"></script>

    <style>
        :root { --dourado: #c5a059; --verde: #5c8e82; --preto: #0f0f0f; --cinza: #1a1a1a; --texto: #eeeeee; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--preto); color: var(--texto); overflow-x: hidden; }
        
        .hero { text-align: center; padding: 60px 20px 40px; background: linear-gradient(180deg, var(--cinza) 0%, var(--preto) 100%); border-bottom: 1px solid rgba(197, 160, 89, 0.1); position: relative; }
        .hero h1 { color: var(--dourado); font-size: 36px; font-weight: 800; margin: 0; letter-spacing: 1px; text-transform: uppercase; }
        .hero p { color: #888; font-size: 14px; max-width: 500px; margin: 15px auto 0; line-height: 1.6; }
        .btn-back-home { position: absolute; top: 20px; left: 20px; color: var(--dourado); text-decoration: none; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        /* PAINEL DE FILTROS PADRONIZADOS */
        .dashboard-filters { background: var(--cinza); padding: 30px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 40px; }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .filter-title { font-size: 11px; text-transform: uppercase; color: var(--dourado); font-weight: 700; letter-spacing: 2px; margin-bottom: 15px; display: block; border-left: 2px solid var(--dourado); padding-left: 10px; }
        
        /* CAIXAS COM ALTURA FIXA PARA 2 ITENS */
        .checkbox-list { 
            height: 85px; /* Altura exata para aparecer 2 itens */
            overflow-y: auto; 
            background: rgba(0,0,0,0.2); 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #333;
        }
        .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 5px 0; cursor: pointer; font-size: 13px; color: #aaa; transition: 0.3s; }
        .checkbox-item:hover { color: #fff; }
        .checkbox-item input { accent-color: var(--dourado); cursor: pointer; }

        /* CUSTOM SCROLLBAR PARA AS CAIXAS */
        .checkbox-list::-webkit-scrollbar { width: 4px; }
        .checkbox-list::-webkit-scrollbar-thumb { background: var(--dourado); border-radius: 10px; }

        /* HEADER DE RESULTADOS */
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        .results-count { color: var(--dourado); font-weight: 700; font-size: 14px; background: rgba(197, 160, 89, 0.1); padding: 5px 12px; border-radius: 20px; }

        /* GRID E CARDS (DESIGN ORIGINAL RESTAURADO) */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .card { background: var(--cinza); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 30px; transition: 0.4s; display: flex; flex-direction: column; cursor: pointer; }
        .card:hover { border-color: var(--dourado); transform: translateY(-8px); }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .badge { background: rgba(92, 142, 130, 0.1); color: var(--verde); padding: 6px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid rgba(92, 142, 130, 0.3); }
        .id-badge { color: var(--dourado); font-size: 11px; font-weight: 700; }
        
        .title { font-size: 22px; margin: 0 0 8px; color: var(--texto); font-weight: 700; }
        .cargo { font-size: 13px; color: #888; margin-bottom: 15px; }
        
        .objetivo-tag { background: rgba(197, 160, 89, 0.05); border-left: 2px solid var(--dourado); padding: 8px 12px; margin-bottom: 20px; font-size: 12px; color: #ccc; }
        .objetivo-tag strong { color: var(--dourado); font-weight: 600; text-transform: uppercase; font-size: 10px; display: block; }

        .resumo { font-size: 14px; color: #aaa; line-height: 1.7; flex: 1; }
        .read-more { margin-top: 20px; font-size: 11px; font-weight: 700; color: var(--dourado); text-transform: uppercase; display: flex; align-items: center; gap: 5px; }

        /* MODAL COM NAVEGAÇÃO */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 15, 15, 0.98); z-index:100; backdrop-filter: blur(10px); }
        .modal-body { max-width:900px; margin: 0 auto; background: var(--preto); border-left: 1px solid rgba(197, 160, 89, 0.2); border-right: 1px solid rgba(197, 160, 89, 0.2); height: 100vh; overflow-y: auto; position: relative; padding: 80px 60px; box-sizing: border-box; }
        
        .close-btn { position: fixed; top: 20px; right: 30px; color: #fff; font-size: 35px; cursor: pointer; z-index: 110; opacity: 0.5; transition: 0.3s; }
        .close-btn:hover { opacity: 1; color: var(--dourado); }

        .nav-btn { position: fixed; top: 50%; transform: translateY(-50%); background: rgba(197, 160, 89, 0.05); color: var(--dourado); border: 1px solid rgba(197, 160, 89, 0.3); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; z-index: 105; font-size: 25px; }
        .nav-btn:hover { background: var(--dourado); color: var(--preto); border-color: var(--dourado); }
        .nav-prev { left: 40px; }
        .nav-next { right: 40px; }

        #m-text { line-height: 1.8; color: #ccc; font-size: 16px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="hero">
        <a href="index.html" class="btn-back-home">← Voltar ao Hub</a>
        <h1>Book de Talentos</h1>
        <p>Curadoria exclusiva de perfis executivos qualificados Youp.</p>
    </div>

    <div class="container">
        <div class="dashboard-filters">
            <div class="filters-grid">
                <div class="filter-section">
                    <span class="filter-title">Abrangência</span>
                    <div class="checkbox-list" id="lista-localizacao">
                        <label class="checkbox-item"><input type="checkbox" value="Nacional" onchange="atualizarFiltros()"> Nacional</label>
                        <label class="checkbox-item"><input type="checkbox" value="Internacional" onchange="atualizarFiltros()"> Internacional</label>
                    </div>
                </div>

                <div class="filter-section">
                    <span class="filter-title">Nível Estratégico</span>
                    <div class="checkbox-list" id="lista-nivel">
                        <label class="checkbox-item"><input type="checkbox" value="Operacional" onchange="atualizarFiltros()"> Operacional</label>
                        <label class="checkbox-item"><input type="checkbox" value="Média Liderança" onchange="atualizarFiltros()"> Média Liderança</label>
                        <label class="checkbox-item"><input type="checkbox" value="Alta Liderança" onchange="atualizarFiltros()"> Alta Liderança</label>
                    </div>
                </div>

                <div class="filter-section">
                    <span class="filter-title">Áreas de Atuação</span>
                    <div class="checkbox-list" id="lista-area">
                        </div>
                </div>
            </div>
        </div>

        <div class="results-header">
            <h3>Perfis Encontrados</h3>
            <span class="results-count" id="count-perfis">0</span>
        </div>

        <div id="talentGrid" class="grid"></div>
    </div>

    <div id="modal">
        <span class="close-btn" onclick="fecharModal()">×</span>
        
        <button class="nav-btn nav-prev" onclick="navegarPerfil(-1)">❮</button>
        <button class="nav-btn nav-next" onclick="navegarPerfil(1)">❯</button>

        <div class="modal-body" onclick="event.stopPropagation()">
            <div class="card-header" style="border:none; margin-bottom:10px;">
                <div id="m-area-badges" style="display:flex; gap:5px;"></div>
                <span id="m-id" class="id-badge"></span>
            </div>
            <h2 id="m-perfil" style="font-size:36px; color:var(--texto); margin:0;"></h2>
            <div id="m-cargo" style="color: #888; font-size:16px; margin-bottom:30px; font-weight:600;"></div>
            
            <div class="objetivo-tag" style="display:inline-block;">
                <strong>🎯 Busca Posição de:</strong>
                <span id="m-objetivo" style="color:var(--dourado); font-weight:700;"></span>
            </div>

            <div id="m-text" style="margin-top:40px; border-top:1px solid #333; padding-top:30px;"></div>
            
            <a id="m-zap-link" href="" target="_blank" style="display:block; width:100%; text-align:center; padding:20px; background:var(--verde); color:#fff; text-decoration:none; border-radius:8px; font-weight:700; margin-top:50px;">Solicitar Apresentação via WhatsApp ➔</a>
        </div>
    </div>

    <script>
        let perfisFiltradosGlobal = [];
        let indexAtual = 0;

        document.addEventListener("DOMContentLoaded", () => {
            if (typeof talentosYoup === 'undefined') return;
            popularListaAreas();
            atualizarFiltros();
        });

        function popularListaAreas() {
            const container = document.getElementById('lista-area');
            const areasSet = new Set();
            talentosYoup.forEach(t => {
                const areasArray = Array.isArray(t.area) ? t.area : [t.area];
                areasArray.forEach(a => a && areasSet.add(a.trim()));
            });
            const areasSorted = Array.from(areasSet).sort();
            container.innerHTML = areasSorted.map(area => 
                `<label class="checkbox-item"><input type="checkbox" value="${area}" onchange="atualizarFiltros()"> ${area}</label>`
            ).join('');
        }

        function atualizarFiltros() {
            const locSel = Array.from(document.querySelectorAll('#lista-localizacao input:checked')).map(i => i.value);
            const nivSel = Array.from(document.querySelectorAll('#lista-nivel input:checked')).map(i => i.value);
            const areSel = Array.from(document.querySelectorAll('#lista-area input:checked')).map(i => i.value);

            perfisFiltradosGlobal = talentosYoup.filter(t => {
                const matchLoc = locSel.length === 0 || locSel.includes(t.localizacao);
                const matchNiv = nivSel.length === 0 || nivSel.includes(t.nivel);
                const areasT = Array.isArray(t.area) ? t.area : [t.area];
                const matchAre = areSel.length === 0 || areasT.some(a => areSel.includes(a));
                return matchLoc && matchNiv && matchAre;
            });

            renderizarGrid();
        }

        function renderizarGrid() {
            const grid = document.getElementById('talentGrid');
            document.getElementById('count-perfis').innerText = perfisFiltradosGlobal.length;
            
            if (perfisFiltradosGlobal.length === 0) {
                grid.innerHTML = "<p style='grid-column:1/-1; text-align:center; padding:50px; color:#666;'>Nenhum perfil corresponde aos filtros.</p>";
                return;
            }

            grid.innerHTML = perfisFiltradosGlobal.map((t, idx) => {
                const areasArray = Array.isArray(t.area) ? t.area : [t.area];
                const badgesHTML = areasArray.map(a => `<span class="badge">${a}</span>`).join('');
                return `
                <div class="card" onclick="abrirModalComIndex(${idx})">
                    <div class="card-header">
                        <div class="badge-group">${badgesHTML}</div>
                        <span class="id-badge">ID: ${t.id}</span>
                    </div>
                    <h3 class="title">${t.perfil}</h3>
                    <div class="cargo">${t.cargo}</div>
                    <div class="objetivo-tag"><strong>🎯 Busca Posição de:</strong> ${t.objetivo || 'Não especificado'}</div>
                    <p class="resumo">${t.resumo}</p>
                    <div class="read-more">Ver Perfil Estratégico Completo ➔</div>
                </div>`;
            }).join('');
        }

        function abrirModalComIndex(index) {
            indexAtual = index;
            const t = perfisFiltradosGlobal[indexAtual];
            
            document.getElementById('m-id').innerText = "ID: " + t.id;
            document.getElementById('m-perfil').innerText = t.perfil;
            document.getElementById('m-cargo').innerText = t.cargo;
            document.getElementById('m-objetivo').innerText = t.objetivo || 'Não especificado';
            document.getElementById('m-text').innerHTML = t.conteudo;
            
            const areas = Array.isArray(t.area) ? t.area : [t.area];
            document.getElementById('m-area-badges').innerHTML = areas.map(a => `<span class="badge">${a}</span>`).join('');

            const textoZap = encodeURIComponent(`Olá Ana, tenho interesse no perfil ${t.id} - ${t.perfil}.`);
            document.getElementById('m-zap-link').href = `https://wa.me/5512991322333?text=${textoZap}`;

            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function navegarPerfil(direcao) {
            indexAtual += direcao;
            if (indexAtual < 0) indexAtual = perfisFiltradosGlobal.length - 1;
            if (indexAtual >= perfisFiltradosGlobal.length) indexAtual = 0;
            abrirModalComIndex(indexAtual);
        }

        function fecharModal() {
            document.getElementById('modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('modal').style.display === 'block') {
                if (e.key === 'ArrowRight') navegarPerfil(1);
                if (e.key === 'ArrowLeft') navegarPerfil(-1);
                if (e.key === 'Escape') fecharModal();
            }
        });
    </script>
</body>
</html>
