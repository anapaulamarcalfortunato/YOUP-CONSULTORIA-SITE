<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Material de Apoio - Youp</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --dourado: #c5a059; --verde: #5c8e82; --preto: #0f0f0f; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--preto); color: #fff; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px; }
        h1 { color: var(--dourado); text-align: center; margin-bottom: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(197, 160, 89, 0.1); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--dourado); transform: translateY(-5px); }
        .thumb { width: 100%; height: 180px; object-fit: cover; }
        .content { padding: 20px; }
        .cat { color: var(--verde); font-size: 10px; text-transform: uppercase; font-weight: 600; margin-bottom: 10px; display: block; }
        .title { font-size: 17px; margin: 0; }
        /* Modal básico */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; }
        .modal-body { max-width:700px; margin:50px auto; background:#111; padding:30px; border-radius:10px; border:1px solid var(--dourado); max-height: 80vh; overflow-y: auto;}
    </style>
</head>
<body>
    <div class="container">
        <h1>Biblioteca de Carreira</h1>
        <div id="grid" class="grid">Carregando...</div>
    </div>
    <div id="modal" onclick="this.style.display='none'">
        <div class="modal-body" onclick="event.stopPropagation()">
            <h2 id="m-title" style="color:var(--dourado)"></h2>
            <div id="m-text" style="line-height:1.6; white-space: pre-wrap;"></div>
        </div>
    </div>
    <script>
        const API = 'https://script.google.com/macros/s/AKfycbyYoEJ1coWZpa0rGamY0_zoRom1tJX5w5bDyQ48RuN5CEha_0W7n46HabfqTqMGr63a/exec?tipo=material';
        fetch(API).then(r => r.json()).then(posts => {
            const grid = document.getElementById('grid');
            grid.innerHTML = posts.map(p => `
                <div class="card" onclick="abrir('${p.titulo}', '${p.conteudo.replace(/'/g, "\\'")}')">
                    <img src="${p.imagem}" class="thumb">
                    <div class="content">
                        <span class="cat">${p.categoria}</span>
                        <h3 class="title">${p.titulo}</h3>
                    </div>
                </div>
            `).join('');
        });
        function abrir(t, txt) {
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-text').innerText = txt;
            document.getElementById('modal').style.display = 'block';
        }
    </script>
</body>
</html>
