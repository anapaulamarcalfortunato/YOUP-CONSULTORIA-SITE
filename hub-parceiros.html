<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub de Parceiros | Youp Consultoria</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --dourado: #c5a059; --verde: #5c8e82; --preto: #0a0a0a; --texto: #fdfdfd; --texto-mute: #a0a0a0; }
body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--preto); color: var(--texto); line-height: 1.6; }

/* Navbar */
.navbar { display: flex; justify-content: center; padding: 25px 50px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
.brand-logo { color: var(--dourado); text-decoration: none; font-weight: 800; letter-spacing: 5px; font-size: 16px; }

/* Cabeçalho */
.header-container { max-width: 800px; margin: 60px auto 30px; text-align: center; padding: 0 20px; }
.badge-exclusive { display: inline-block; color: var(--verde); font-size: 11px; font-weight: 800; letter-spacing: 2px; background: rgba(92, 142, 130, 0.1); padding: 6px 15px; border-radius: 4px; margin-bottom: 20px; text-transform: uppercase; }
.title { font-size: 32px; font-weight: 700; color: #fff; margin: 0 0 15px 0; letter-spacing: -0.5px; }
.subtitle { font-size: 15px; color: var(--texto-mute); max-width: 600px; margin: 0 auto; }

/* Wrapper do Sistema */
.app-wrapper { max-width: 800px; margin: 0 auto 100px; padding: 0 20px; }
.iframe-container { position: relative; width: 100%; height: 750px; border-radius: 12px; overflow: hidden; }
.iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background: transparent; }
</style>
</head>
<body>

<nav class="navbar"><div class="brand-logo">YOUP</div></nav>

<div class="header-container">
    <span class="badge-exclusive">Acesso Restrito a Parceiros</span>
    <h1 class="title">Painel de Oportunidades Executivas</h1>
    <p class="subtitle">Insira a posição em aberto. Nossa IA cruzará a demanda com nosso ecossistema de talentos e notificará os executivos com maior aderência instantaneamente.</p>
</div>

<div class="app-wrapper">
    <div class="iframe-container">
        <!-- COLOQUE AQUI A URL DO SEU WEB APP GERADA NO PASSO 3 -->
        <iframe src="https://script.google.com/macros/s/AKfycbxH7nOYH-35otgl8_wuf0PuOVP1CqC9jgIp5ZSc0qi45Wz1fvLLhAg78auu3VNfsbFQeg/exec" frameborder="0"></iframe>
    </div>
</div>

</body>
</html>
